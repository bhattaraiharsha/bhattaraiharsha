<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - The Platform</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
      :root {
        --bg-color: #0f172a;
        --card-bg: rgba(30, 41, 59, 0.7);
        --border-color: rgba(255, 255, 255, 0.1);
        --text-primary: #f8fafc;
        --text-secondary: #94a3b8;
        --primary-color: #4c4ed3;
        --primary-hover: #1409ed;
        --input-bg: #080d19;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family:
          "Inter",
          system-ui,
          -apple-system,
          sans-serif;
      }
      body {
        background-color: var(--bg-color);
        color: var(--text-primary);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        position: relative;
      }
      .background-decor {
        position: absolute;
        width: 450px;
        height: 450px;
        border-radius: 50%;
        filter: blur(90px);
        opacity: 0.15;
        z-index: -1;
      }
      .animate-blob1 {
        background: #6366f1;
        top: -10%;
        left: -10%;
        animation: float-blob 14s infinite alternate;
      }
      .animate-blob2 {
        background: #ec4899;
        bottom: -10%;
        right: -10%;
        animation: float-blob 14s infinite alternate-reverse 2s;
      }
      @keyframes float-blob {
        0% {
          transform: translate(0px, 0px) scale(1);
        }
        50% {
          transform: translate(30px, -50px) scale(1.1);
        }
        100% {
          transform: translate(-15px, 15px) scale(0.9);
        }
      }
      .card-container {
        background: var(--card-bg);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--border-color);
        padding: 2.5rem;
        border-radius: 1.25rem;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        text-align: center;
      }
      .avatar-header {
        background: rgba(99, 102, 241, 0.15);
        color: var(--primary-color);
        width: 60px;
        height: 60px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.5rem;
      }
      .avatar-icon {
        width: 28px;
        height: 28px;
      }
      h2 {
        font-size: 1.75rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
        letter-spacing: -0.025em;
      }
      .subtitle {
        color: var(--text-secondary);
        font-size: 0.875rem;
        margin-bottom: 2rem;
      }
      form {
        text-align: left;
      }
      .input-group {
        margin-bottom: 1.25rem;
      }
      label {
        display: block;
        font-size: 0.85rem;
        font-weight: 500;
        margin-bottom: 0.5rem;
        color: var(--text-secondary);
      }
      .password-label {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .forgot-link,
      .signup-text a {
        color: var(--primary-color);
        text-decoration: none;
        font-size: 0.85rem;
        transition: color 0.2s;
      }
      .forgot-link:hover,
      .signup-text a:hover {
        color: var(--primary-hover);
        text-decoration: underline;
      }
      .input-wrapper {
        position: relative;
        display: flex;
        align-items: center;
      }
      .input-icon {
        position: absolute;
        left: 1rem;
        color: var(--text-secondary);
        width: 18px;
        height: 18px;
        pointer-events: none;
      }

      input[type="email"],
      input[type="password"],
      input[type="text"] {
        width: 100%;
        padding: 0.75rem 1rem 0.75rem 2.75rem;
        background: var(--input-bg);
        border: 1px solid var(--border-color);
        border-radius: 0.5rem;
        color: var(--text-primary);
        font-size: 0.95rem;
        transition: all 0.2s ease;
      }

      input:focus {
        outline: none;
        border-color: var(--primary-color);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
      }

      .toggle-password {
        position: absolute;
        right: 1rem;
        background: none;
        border: none;
        color: var(--text-secondary);
        cursor: pointer;
        display: flex;
        align-items: center;
        padding: 0;
        transition: color 0.2s;
      }

      .toggle-password:hover {
        color: var(--text-primary);
      }

      .toggle-password svg {
        width: 18px;
        height: 18px;
      }

      /* Checkbox Layout */
      .form-actions {
        margin-bottom: 1.5rem;
      }

      .remember-me {
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      .remember-me input {
        cursor: pointer;
        accent-color: var(--primary-color);
        width: 15px;
        height: 15px;
      }

      .remember-me label {
        margin-bottom: 0;
        cursor: pointer;
        user-select: none;
      }

      /* Primary Action Button */
      .btn-primary {
        width: 100%;
        padding: 0.85rem;
        background: var(--primary-color);
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 0.5rem;
        transition:
          background 0.2s ease,
          transform 0.1s ease;
      }

      .btn-primary:hover {
        background: var(--primary-hover);
      }

      .btn-primary:active {
        transform: scale(0.99);
      }

      .btn-icon {
        width: 16px;
        height: 16px;
      }

      /* Utility & Navigation Links */
      .signup-text {
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--text-secondary);
      }

      .back-to-welcome-link {
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
        margin-top: 2rem;
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.875rem;
        transition: color 0.2s;
      }

      .back-to-welcome-link:hover {
        color: var(--text-primary);
      }

      .back-to-welcome-link svg {
        width: 16px;
        height: 16px;
      }
    </style>
  </head>
  <body>
    <div class="background-decor animate-blob1"></div>
    <div class="background-decor animate-blob2"></div>

    <div class="card-container" id="login-view">
      <div class="avatar-header">
        <i data-lucide="user-round" class="avatar-icon"></i>
      </div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Enter your info to Log in</p>

      <form id="login-form">
        <div class="input-group">
          <label for="email">Email Address</label>
          <div class="input-wrapper">
            <i data-lucide="mail" class="input-icon"></i>
            <input
              type="email"
              id="email"
              placeholder="you@example.com"
              required
            />
          </div>
        </div>

        <div class="input-group">
          <div class="password-label">
            <label for="password">Password</label>
            <a href="#" class="forgot-link">Forgot?</a>
          </div>
          <div class="input-wrapper">
            <i data-lucide="lock" class="input-icon"></i>
            <input
              type="password"
              id="password"
              placeholder="••••••••"
              required
            />
            <button
              type="button"
              class="toggle-password"
              id="toggle-password-btn"
              aria-label="Toggle password visibility"
            >
              <i data-lucide="eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <div class="form-actions">
          <div class="remember-me">
            <input type="checkbox" id="remember" />
            <label for="remember">Remember me</label>
          </div>
        </div>

        <button type="submit" class="btn-primary">
          <span>Sign In</span>
          <i data-lucide="arrow-right" class="btn-icon"></i>
        </button>
      </form>

      <p class="signup-text">
        Don't have an account? <a href="#">Create one</a>
      </p>

      <a href="index.html" class="back-to-welcome-link">
        <i data-lucide="chevron-left"></i> Back
      </a>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // 1. Initialize Lucide Vector Icons
        lucide.createIcons();

        const passwordInput = document.getElementById("password");
        const togglePasswordBtn = document.getElementById(
          "toggle-password-btn",
        );
        const loginForm = document.getElementById("login-form");

        // 2. Interactive Password Field Toggle & Dynamic Icon Updating
        if (togglePasswordBtn && passwordInput) {
          togglePasswordBtn.addEventListener("click", () => {
            const isPasswordType =
              passwordInput.getAttribute("type") === "password";

            // Switch visibility mode
            passwordInput.setAttribute(
              "type",
              isPasswordType ? "text" : "password",
            );

            // Target the dynamic icon placeholder
            const eyeIcon = togglePasswordBtn.querySelector("i");
            if (isPasswordType) {
              eyeIcon.setAttribute("data-lucide", "eye-off");
            } else {
              eyeIcon.setAttribute("data-lucide", "eye");
            }

            // Request Lucide to redraw components inside the context button
            lucide.createIcons({
              attrs: { class: "input-icon" },
              nameAttr: "data-lucide",
            });
          });
        }

        // 3. Form Interception Control Handling
        if (loginForm) {
          loginForm.addEventListener("submit", (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const rememberChecked = document.getElementById("remember").checked;

            console.log("Submit request logged:", { email, rememberChecked });
          });
        }
      });
    </script>
  </body>
</html>
