<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Harsha's Audio Pitch Studio</title>
    <style>
      body {
        font-family: -apple-system, sans-serif;
        background: #f7fafc;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        text-align: center;
        max-width: 400px;
      }
      h1 {
        font-size: 18pt;
        color: #1a202c;
        margin-bottom: 8px;
      }
      p {
        font-size: 10pt;
        color: #718096;
        margin-bottom: 24px;
      }
      button {
        background: #2b6cb0;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 11pt;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #2c5282;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Strategic Website Pitch</h1>
      <p>
        Press the button below to generate and listen to the professional audio
        pitch note.
      </p>
      <button onclick="playPitch()">🎙️ Play Audio Note</button>
    </div>

    <script>
      function playPitch() {
        window.speechSynthesis.cancel(); // Reset any existing speech

        const pitchText =
          "Hey [ravi], Harsha here. Hope you're having a productive week.I was looking through your firm's online presence, and it struck me: as a management consultant, your entire business runs on authority and structural precision. But right now, your website isn't reflecting that standard. Most consulting sites out there rely on slow, bloated templates that actually push high-value corporate leads away because the conversion path is confusing.Here is how we fix that. I build custom digital platforms designed explicitly to capture enterprise clients. I handle the UI blueprint in Figma to make sure it looks elite, and then I engineer it using clean, lightweight frontend code like Tailwind CSS so it loads instantly. Finally, I host everything securely on Cloudflare edge networks for maximum global speed.  When a prospective corporate client lands on your page, they shouldn't just see a basic template. They should experience your strategic precision before they even jump on a discovery call with you.I’ve already mapped out a one-page architecture blueprint for your case studies and a friction-free booking funnel. Let me know if you have five minutes this week to take a look at the layout, or drop me a line back at contact@harshabhattarai.com.np. Let's talk soon.";

        const utterance = new SpeechSynthesisUtterance(pitchText);

        // Select a premium, natural sounding english voice if available
        const voices = window.speechSynthesis.getVoices();
        const premiumVoice = voices.find(
          (voice) =>
            voice.name.includes("Google") || voice.name.includes("Natural"),
        );
        if (premiumVoice) utterance.voice = premiumVoice;

        utterance.rate = 0.95; // Slightly slower pacing for professional clarity
        utterance.pitch = 1.0;

        window.speechSynthesis.speak(utterance);
      }
      // Pre-load voices for chrome compatibility
      window.speechSynthesis.getVoices();
    </script>
  </body>
</html>
