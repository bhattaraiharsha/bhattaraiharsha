<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Harsha's Audio Pitch Studio</title>
    <style>
      body {
        font-family: -apple-system, sans-serif;
        background: #f7fafc;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }
      .card {
        background: #ffffff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        text-align: center;
        max-width: 400px;
      }
      h1 {
        font-size: 18pt;
        color: #1a202c;
        margin-bottom: 8px;
      }
      p {
        font-size: 10pt;
        color: #718096;
        margin-bottom: 24px;
      }
      button {
        background: #2b6cb0;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 11pt;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #2c5282;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Strategic Website Pitch</h1>
      <p>
        Press the button below to generate and listen to the professional audio
        pitch note.
      </p>
      <button onclick="playPitch()">🎙️ Play Audio Note</button>
    </div>

    <script>
      function playPitch() {
        window.speechSynthesis.cancel(); // Reset any existing speech

        const pitchText =
          "Hello, this is Harsha. I am excited to present my strategic website pitch. Our platform is designed to enhance user engagement and drive conversions through intuitive design and seamless functionality. We focus on delivering a premium user experience that aligns with your brand's vision. Let's collaborate to create a website that not only meets but exceeds your expectations. Thank you for considering our proposal.";

        const utterance = new SpeechSynthesisUtterance(pitchText);

        // Select a premium, natural sounding english voice if available
        const voices = window.speechSynthesis.getVoices();
        const premiumVoice = voices.find(
          (voice) =>
            voice.name.includes("Google") || voice.name.includes("Natural"),
        );
        if (premiumVoice) utterance.voice = premiumVoice;

        utterance.rate = 0.95; // Slightly slower pacing for professional clarity
        utterance.pitch = 1.0;

        window.speechSynthesis.speak(utterance);
      }
      // Pre-load voices for chrome compatibility
      window.speechSynthesis.getVoices();
    </script>
  </body>
</html>
